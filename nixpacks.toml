# Nixpacks configuration for Railway
# https://nixpacks.com/docs/providers/php

[phases.setup]
# PHP version and extensions
nixPkgs = ["php84", "php84Extensions.sqlite3", "php84Packages.composer"]

[phases.install]
# Ensure bootstrap/cache directory exists and is writable
cmds = [
    "mkdir -p /app/bootstrap/cache",
    "chmod -R 755 /app/bootstrap/cache",
    "composer install --ignore-platform-reqs"
]

[phases.build]
# Install dependencies and cache Laravel configurations
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "php artisan config:cache",
    "php artisan route:cache"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 30
